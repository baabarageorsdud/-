# ===== 区块链存证演示服务配置 =====

# 本地 Hardhat 节点 RPC（npm run chain 启动后默认为此地址）
blockchain.rpc-url=http://127.0.0.1:8545

# Hardhat 默认账户 #0 的私钥（仅用于本地测试，绝不在生产环境中使用明文私钥）
# 本地测试时使用 Hardhat 内置账户私钥：0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
# 生产环境请通过环境变量注入：export BLOCKCHAIN_PRIVATE_KEY=0x...
blockchain.private-key=REPLACE_WITH_YOUR_PRIVATE_KEY

# 合约地址（npm run deploy 后填入，每次重新部署后需更新）
blockchain.contract-address=REPLACE_AFTER_DEPLOYMENT

# 服务端口
server.port=8080

# 日志级别
logging.level.com.example.blockchain=DEBUG
logging.level.org.web3j=WARN
